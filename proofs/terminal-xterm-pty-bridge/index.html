<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>C4OS xterm PTY bridge proof</title>
  <link rel="stylesheet" href="/xterm.css">
  <style>
    :root {
      color-scheme: dark;
      --frame: #3f3f3c;
      --terminal: #1e1e1f;
      --edge: #101012;
      --muted: #b8b9b2;
      --red: #ff5f57;
      --yellow: #ffbd2e;
      --green: #28c840;
    }

    * { box-sizing: border-box; }

    body {
      align-items: center;
      background: #111214;
      display: grid;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    .terminal-window {
      background: var(--terminal);
      border: 1px solid var(--edge);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr);
      height: min(760px, calc(100vh - 48px));
      max-width: 1220px;
      width: min(100%, 1220px);
    }

    .titlebar {
      align-items: center;
      background: var(--frame);
      border-bottom: 1px solid #151515;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: 0 16px;
    }

    .lights { display: flex; gap: 14px; }
    .light { border-radius: 999px; height: 22px; width: 22px; }
    .red { background: var(--red); }
    .yellow { background: var(--yellow); }
    .green { background: var(--green); }

    .title, .status {
      color: var(--muted);
      font: 700 18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title {
      font-size: 26px;
      text-align: center;
    }

    #terminal {
      min-height: 0;
      overflow: hidden;
      padding: 8px 10px;
    }

    .xterm {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <main class="terminal-window">
    <header class="titlebar">
      <div class="lights" aria-hidden="true">
        <span class="light red"></span>
        <span class="light yellow"></span>
        <span class="light green"></span>
      </div>
      <div class="title">📁 c4os — xterm + PTY — 102×31</div>
      <div id="status" class="status">connecting</div>
    </header>
    <section id="terminal" aria-label="xterm PTY bridge proof"></section>
  </main>

  <script src="/xterm.js"></script>
  <script>
    const status = document.querySelector("#status");
    const term = new Terminal({
      cursorBlink: true,
      cursorStyle: "block",
      fontFamily: "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace",
      fontSize: 21,
      fontWeight: 700,
      lineHeight: 1.18,
      rows: 31,
      cols: 102,
      theme: {
        background: "#1e1e1f",
        foreground: "#f4f4f0",
        cursor: "#c4c4bf",
        selectionBackground: "#565a61"
      }
    });

    term.open(document.querySelector("#terminal"));
    term.focus();

    function sendInput(data) {
      return fetch("/input", {
        body: data,
        method: "POST"
      });
    }

    function sendResize() {
      const dimensions = term._core?._renderService?.dimensions;
      const cols = term.cols || 102;
      const rows = term.rows || 31;
      fetch("/resize", {
        body: JSON.stringify({ rows, cols, width: dimensions?.css?.canvas?.width || 0, height: dimensions?.css?.canvas?.height || 0 }),
        headers: { "content-type": "application/json" },
        method: "POST"
      });
    }

    term.onData((data) => {
      sendInput(data);
    });

    const events = new EventSource("/events");
    events.addEventListener("open", () => {
      status.textContent = "connected";
    });
    events.addEventListener("message", (event) => {
      term.write(JSON.parse(event.data));
    });
    events.addEventListener("error", () => {
      status.textContent = "disconnected";
    });

    addEventListener("resize", () => sendResize());
    setTimeout(sendResize, 100);

    window.__c4osBridgeProof = {
      send: async (value) => {
        await sendInput(value);
      },
      text: () => document.querySelector(".xterm-screen")?.innerText || ""
    };
  </script>
</body>
</html>
